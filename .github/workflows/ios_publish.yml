name: Deploy iOS to App Store Connect

on:
  push:
    branches:
      - publish-ios # Only trigger when we push to a special 'publish-ios' branch to save your free minutes!

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Sync iOS Capacitor Folder
        run: npx cap sync ios

      - name: Install Apple Certificates on Cloud Mac
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "temporary-keychain-pass"
        run: |
          set -x
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          printenv BUILD_CERTIFICATE_BASE64 | tr -d '\n\r ' | base64 --decode -o $CERTIFICATE_PATH
          printenv BUILD_PROVISION_PROFILE_BASE64 | tr -d '\n\r ' | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "crowncare123" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS Xcode App
        run: |
          cd ios/App
          # Auto-increment the build number so Apple accepts new uploads
          xcrun agvtool next-version -all || true
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release clean archive -archivePath $RUNNER_TEMP/App.xcarchive

      - name: Export App Binary (.ipa)
        run: |
          cd ios/App
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -x
          authKeyPath=$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_KEY_ID}.p8
          printenv APP_STORE_CONNECT_API_KEY_BASE64 | tr -d '\n\r ' | base64 --decode -o $authKeyPath
          xcrun altool --upload-app -f $RUNNER_TEMP/export/App.ipa -t ios --apiKey $APP_STORE_CONNECT_API_KEY_KEY_ID --apiIssuer $APP_STORE_CONNECT_API_KEY_ISSUER_ID
