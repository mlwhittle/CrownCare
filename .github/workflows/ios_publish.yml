name: Deploy iOS to App Store Connect

on:
  push:
    branches:
      - publish-ios # Only trigger when we push to a special 'publish-ios' branch to save your free minutes!

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Sync iOS Capacitor Folder
        run: npx cap sync ios

      - name: Install Apple Certificates on Cloud Mac
        env:
          RAW_DIST_CER: ${{ secrets.RAW_DIST_CER }}
          RAW_PRIVATE_KEY: ${{ secrets.RAW_PRIVATE_KEY }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: "temporary-keychain-pass"
        run: |
          set -x
          CERT_PATH=$RUNNER_TEMP/ios_dist.cer
          KEY_PATH=$RUNNER_TEMP/CrownCare.key
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          printenv BUILD_PROVISION_PROFILE_BASE64 | tr -d '\n\r ' | base64 --decode -o $PP_PATH
          printenv RAW_DIST_CER | tr -d '\n\r ' | base64 --decode -o $CERT_PATH
          printenv RAW_PRIVATE_KEY | tr -d '\n\r ' | base64 --decode -o $KEY_PATH

          openssl x509 -in $CERT_PATH -inform DER -out ${CERT_PATH}.pem -outform PEM
          openssl pkcs12 -export -in ${CERT_PATH}.pem -inkey $KEY_PATH -out $CERTIFICATE_PATH -passout pass:crowncare123

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          security import $CERTIFICATE_PATH -P "crowncare123" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build iOS Xcode App
        run: |
          cd ios/App
          # Auto-increment the build number so Apple accepts new uploads
          xcrun agvtool next-version -all || true
          xcodebuild -project App.xcodeproj -scheme App -configuration Release clean archive -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="6LW5TYA8KT" \
            PROVISIONING_PROFILE_SPECIFIER="CrownCare App Store Profile" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export App Binary (.ipa)
        run: |
          cd ios/App
          xcodebuild -exportArchive -archivePath $RUNNER_TEMP/App.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        env:
          RAW_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          RAW_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -x
      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -x
          export IPA_PATH="$RUNNER_TEMP/export/App.ipa"
          cat << 'EOF' > jwt_upload.cjs
          const https = require('https');
          const crypto = require('crypto');
          
          const keyId = process.env.APP_STORE_CONNECT_API_KEY_KEY_ID.replace(/[^A-Za-z0-9]/g, '');
          const issuerId = process.env.APP_STORE_CONNECT_API_KEY_ISSUER_ID.replace(/[^A-Za-z0-9\-]/g, '');
          const base64Key = process.env.APP_STORE_CONNECT_API_KEY_BASE64.replace(/[^A-Za-z0-9+\/=]/g, '');
          
          const privateKeyPem = Buffer.from(base64Key, 'base64').toString('utf8');
          
          const header = { alg: 'ES256', kid: keyId, typ: 'JWT' };
          const payload = {
            iss: issuerId,
            exp: Math.floor(Date.now() / 1000) + 10 * 60,
            aud: 'appstoreconnect-v1'
          };
          
          const encodedHeader = Buffer.from(JSON.stringify(header)).toString('base64url');
          const encodedPayload = Buffer.from(JSON.stringify(payload)).toString('base64url');
          const tokenData = `${encodedHeader}.${encodedPayload}`;
          
          const sign = crypto.createSign('SHA256');
          sign.update(tokenData);
          sign.end();
          
          const signature = sign.sign(privateKeyPem);
          let offset = 2;
          if (signature[1] > 0x80) offset += signature[1] - 0x80;
          if (signature[offset] !== 0x02) throw new Error("Expected Integer");
          let rLen = signature[offset + 1];
          let rBytes = signature.subarray(offset + 2, offset + 2 + rLen);
          if (rBytes.length === 33 && rBytes[0] === 0x00) rBytes = rBytes.subarray(1);
          offset += 2 + rLen;
          if (signature[offset] !== 0x02) throw new Error("Expected Integer");
          let sLen = signature[offset + 1];
          let sBytes = signature.subarray(offset + 2, offset + 2 + sLen);
          if (sBytes.length === 33 && sBytes[0] === 0x00) sBytes = sBytes.subarray(1);
          
          const pad = (buf) => {
            if (buf.length >= 32) return buf;
            const target = Buffer.alloc(32);
            buf.copy(target, 32 - buf.length);
            return target;
          };
          
          const rsSignature = Buffer.concat([pad(rBytes), pad(sBytes)]);
          const jwt = `${tokenData}.${rsSignature.toString('base64url')}`;
          
          console.log('JWT successfully generated! Pinging Apple API directly...');
          
          const options = {
            hostname: 'api.appstoreconnect.apple.com',
            path: '/v1/users',
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${jwt}`
            }
          };
          
          const req = https.request(options, (res) => {
            console.log(`STATUS: ${res.statusCode}`);
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              console.log(data);
              if (res.statusCode !== 200) {
                process.exit(1);
              }
            });
          });
          
          req.on('error', (e) => {
            console.error(e);
            process.exit(1);
          });
          req.end();
          EOF
          
          node jwt_upload.cjs
